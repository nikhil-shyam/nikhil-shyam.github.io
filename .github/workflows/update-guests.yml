name: Update Guests JSON

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-guests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download CSV
        run: |
          curl --fail -L "${{ secrets.SHEET_URL }}" -o guests.csv

      - name: Convert CSV to JSON
        run: python convert.py

      - name: Commit updated guests.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add guests.json
          git diff --cached --quiet || git commit -m "Update guest list"
          git push