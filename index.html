<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Table Finder</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Welcome</h1>

    <p class="subtitle">
      <span>Search your name or a number to find your assigned table.</span>
      <span>Type in your full name to locate your table on the map.</span>
    </p>

    <input
      type="text"
      id="search"
      placeholder="Enter your name..."
      autocomplete="off"
    />

    <svg id="floor-map" viewBox="0 0 420 185" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="420" height="185" fill="#fbfaf8"/>

      <!-- Stage -->
      <rect x="140" y="0" width="140" height="40" rx="2" class="stage" />
      <text x="210" y="22" class="map-label">Stage</text>

      <!-- Dance Floor -->
      <rect x="160" y="40" width="100" height="100" class="dance-floor" />
      <text x="210" y="93" class="map-label">Dance Floor</text>

      <!-- DJ Booth -->
      <rect x="190" y="150" width="40" height="20" class="dj-booth" />
      <text x="210" y="162" class="small-label">DJ Booth</text>

      <!-- Doors -->
      <rect id="left-door" x="0" y="175" width="20" height="10" class="door" />
      <text x="10" y="181" class="door-label">Door</text>

      <rect id="right-door" x="325" y="175" width="20" height="10" class="door" />
      <text x="335" y="181" class="door-label">Door</text>

      <!-- Top row: bottom aligned with stage -->
      <g class="table-group">
        <circle id="table-13" cx="27.5" cy="60" r="8.5"/><text x="27.5" y="60">13</text>
        <circle id="table-14" cx="47.5" cy="60" r="8.5"/><text x="47.5" y="60">14</text>
        <circle id="table-15" cx="67.5" cy="60" r="8.5"/><text x="67.5" y="60">15</text>
        <circle id="table-16" cx="87.5" cy="60" r="8.5"/><text x="87.5" y="60">16</text>
        <circle id="table-17" cx="107.5" cy="60" r="8.5"/><text x="107.5" y="60">17</text>

        <circle id="table-18" cx="312.5" cy="60" r="8.5"/><text x="312.5" y="60">18</text>
        <circle id="table-19" cx="332.5" cy="60" r="8.5"/><text x="332.5" y="60">19</text>
        <circle id="table-20" cx="352.5" cy="60" r="8.5"/><text x="352.5" y="60">20</text>
        <circle id="table-21" cx="372.5" cy="60" r="8.5"/><text x="372.5" y="60">21</text>
        <circle id="table-22" cx="392.5" cy="60" r="8.5"/><text x="392.5" y="60">22</text>
      </g>

      <!-- Middle row: 25 down from top of dance floor -->
      <g class="table-group">
        <circle id="table-12" cx="17.5" cy="90" r="8.5"/><text x="17.5" y="90">12</text>
        <circle id="table-11" cx="37.5" cy="90" r="8.5"/><text x="37.5" y="90">11</text>
        <circle id="table-10" cx="57.5" cy="90" r="8.5"/><text x="57.5" y="90">10</text>
        <circle id="table-9" cx="77.5" cy="90" r="8.5"/><text x="77.5" y="90">9</text>
        <circle id="table-8" cx="97.5" cy="90" r="8.5"/><text x="97.5" y="90">8</text>
        <circle id="table-7" cx="117.5" cy="90" r="8.5"/><text x="117.5" y="90">7</text>

        <circle id="table-23" cx="302.5" cy="90" r="8.5"/><text x="302.5" y="90">23</text>
        <circle id="table-24" cx="322.5" cy="90" r="8.5"/><text x="322.5" y="90">24</text>
        <circle id="table-25" cx="342.5" cy="90" r="8.5"/><text x="342.5" y="90">25</text>
        <circle id="table-26" cx="362.5" cy="90" r="8.5"/><text x="362.5" y="90">26</text>
        <circle id="table-27" cx="382.5" cy="90" r="8.5"/><text x="382.5" y="90">27</text>
        <circle id="table-28" cx="402.5" cy="90" r="8.5"/><text x="402.5" y="90">28</text>
      </g>

      <!-- Bottom row: 25 up from bottom of dance floor -->
      <g class="table-group">
        <circle id="table-1" cx="17.5" cy="120" r="8.5"/><text x="17.5" y="120">1</text>
        <circle id="table-2" cx="37.5" cy="120" r="8.5"/><text x="37.5" y="120">2</text>
        <circle id="table-3" cx="57.5" cy="120" r="8.5"/><text x="57.5" y="120">3</text>
        <circle id="table-4" cx="77.5" cy="120" r="8.5"/><text x="77.5" y="120">4</text>
        <circle id="table-5" cx="97.5" cy="120" r="8.5"/><text x="97.5" y="120">5</text>
        <circle id="table-6" cx="117.5" cy="120" r="8.5"/><text x="117.5" y="120">6</text>

        <circle id="table-29" cx="302.5" cy="120" r="8.5"/><text x="302.5" y="120">29</text>
        <circle id="table-30" cx="322.5" cy="120" r="8.5"/><text x="322.5" y="120">30</text>
        <circle id="table-31" cx="342.5" cy="120" r="8.5"/><text x="342.5" y="120">31</text>
        <circle id="table-32" cx="362.5" cy="120" r="8.5"/><text x="362.5" y="120">32</text>
        <circle id="table-33" cx="382.5" cy="120" r="8.5"/><text x="382.5" y="120">33</text>
        <circle id="table-34" cx="402.5" cy="120" r="8.5"/><text x="402.5" y="120">34</text>
      </g>
    </svg>

    <div class="map-key">
      <span class="key-star">■</span> - You Are Here
    </div>

    <div id="result"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
